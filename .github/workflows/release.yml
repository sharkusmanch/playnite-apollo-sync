---
name: "Release"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: robinraju/release-downloader@v1.8
        id: download_playnite
        with:
          repository: "JosefNemec/Playnite"
          latest: true
          tarBall: false
          zipBall: false
          fileName: "*.7z"
          out-file-path: ${{ runner.temp }}/playnite

      - name: Extract Playnite
        run: 7z x ${{ runner.temp }}/playnite/*.7z -o${{ runner.temp }}/playnite

      - run: |
          dotnet build ApolloSync.csproj -c Release
          ${{ runner.temp }}/playnite/Toolbox.exe pack bin/Release/net462/ dist

      - uses: actions/upload-artifact@v6
        with:
          name: artifacts
          path: |
            dist/*.pext

  release:
    name: "Release"
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Get Version
        id: version
        uses: mikefarah/yq@master
        with:
          cmd: yq '.Version' extension.yaml

      - name: Pull artifacts
        uses: actions/download-artifact@v7
        with:
          name: artifacts

      - run: |
          mv ApolloSync_*.pext ApolloSync_v${{ steps.version.outputs.result }}.pext

      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          automatic_release_tag: "v${{ steps.version.outputs.result }}"
          files: |
            *.pext
